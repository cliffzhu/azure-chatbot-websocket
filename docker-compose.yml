version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: azure-chatbot-websocket:local
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3978:3978"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
